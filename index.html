<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PATRIC SOFT ® | Food Delivery Premium</title>
    <link rel="icon" href="https://fav.farm/👨‍🍳">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>PATRIC SOFT ®</h1>
    <p>Premium Gastronomic Interface</p>
</header>

<div class="container">
    <div class="user-data-box">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="user-name" placeholder="Tu Nombre">
        </div>
        <div class="input-group">
            <i class="fas fa-map-marker-alt"></i>
            <input type="text" id="user-address" placeholder="Dirección (Calle, N°, Barrio)">
        </div>
    </div>

    <div class="categories-container">
        <button class="btn-cat active" onclick="filterProducts('todos')">Todos</button>
        <button class="btn-cat" onclick="filterProducts('pizzas')">Pizzas</button>
        <button class="btn-cat" onclick="filterProducts('empanadas')">Empanadas</button>
        <button class="btn-cat" onclick="filterProducts('sandwich')">Sandwich</button>
        <button class="btn-cat" onclick="filterProducts('elaborada')">Elaborados</button>
        <button class="btn-cat" onclick="filterProducts('ensaladas')">Ensaladas</button>
        <button class="btn-cat" onclick="filterProducts('aguas')">Aguas</button>
        <button class="btn-cat" onclick="filterProducts('gaseosas')">Gaseosas</button>
        <button class="btn-cat" onclick="filterProducts('vinos')">Vinos</button>
    </div>

    <div class="product-grid" id="grid">
        </div>
</div>

<div id="cart-bar" class="cart-bar">
    <div class="cart-left">
        <span class="badge" id="cart-count">0</span>
        <div id="cart-total-display"></div>
        <button class="btn-clear" onclick="clearCart()" title="Vaciar pedido">
            <i class="fas fa-trash-alt"></i>
        </button>
    </div>
    <a href="#" class="btn-order" onclick="sendOrder()">
        <i class="fab fa-whatsapp"></i> Pedir
    </a>
</div>

<footer>
    <div class="footer-content">
        <p>PATRIC SOFT ® | Soluciones Digitales 2026</p>
        <div class="dev-contact">
            <span>¿Querés una App como esta para tu negocio?</span>
            <a href="https://wa.me/5492657521775?text=Hola!%20Vi%20tu%20sistema%20de%20Roticer%C3%ADa%20y%20me%20interesa%20uno%20para%20mi%20proyecto." target="_blank">
                <i class="fab fa-whatsapp"></i> Contactar al Desarrollador
            </a>
        </div>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
